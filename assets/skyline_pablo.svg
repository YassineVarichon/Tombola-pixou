<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="100%">
  <!-- Beautiful, modern vector graphic of Nanterre's Cité Pablo Picasso cylindrical cloud towers -->
  <defs>
    <!-- Gradients for towers -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="pabloBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>
    <linearGradient id="pabloGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECFDF5" />
      <stop offset="100%" stop-color="#D1FAE5" />
    </linearGradient>
    <linearGradient id="pabloPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF1F2" />
      <stop offset="100%" stop-color="#FFE4E6" />
    </linearGradient>
    <linearGradient id="pabloYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FEF9C3" />
      <stop offset="100%" stop-color="#FEF08A" />
    </linearGradient>
    <linearGradient id="pabloPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F3FF" />
      <stop offset="100%" stop-color="#DDD6FE" />
    </linearGradient>
  </defs>

  <!-- Clean sky background -->
  <rect width="1200" height="200" fill="url(#skyGrad)" />

  <!-- Background silhouette trees -->
  <g fill="#F1F5F9" opacity="0.8">
    <path d="M0,200 Q40,170 80,200 T160,200 T240,200 T320,200 T400,200 T480,200 T560,200 T640,200 T720,200 T800,200 T880,200 T960,200 T1040,200 T1120,200 T1200,200 Z" />
  </g>

  <!-- Ground base line -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#E2E8F0" stroke-width="2" />

  <!-- Cité Pablo Picasso Cylindrical Cloud Towers Group -->
  <!-- Tower 1: Left Small (Yellow) -->
  <g transform="translate(150, 80)">
    <path d="M0,0 L50,0 C55,0 60,5 60,10 L60,120 L0,120 Z" fill="url(#pabloYellow)" stroke="#E2E8F0" stroke-width="1" />
    <!-- Round windows -->
    <circle cx="15" cy="20" r="3" fill="#64748B" />
    <circle cx="30" cy="20" r="3" fill="#64748B" />
    <circle cx="45" cy="20" r="3" fill="#64748B" />
    <circle cx="15" cy="50" r="3" fill="#64748B" />
    <circle cx="30" cy="50" r="3" fill="#64748B" />
    <circle cx="45" cy="50" r="3" fill="#64748B" />
    <circle cx="15" cy="80" r="3" fill="#64748B" />
    <circle cx="30" cy="80" r="3" fill="#64748B" />
    <circle cx="45" cy="80" r="3" fill="#64748B" />
  </g>

  <!-- Tower 2: Medium (Blue clouds) -->
  <g transform="translate(260, 40)">
    <rect x="0" y="0" width="80" height="160" fill="url(#pabloBlue)" stroke="#E2E8F0" stroke-width="1.2" rx="10" />
    <!-- Characteristic mosaic clouds -->
    <path d="M10,20 Q30,5 50,20 T70,30" fill="#93C5FD" opacity="0.4" />
    <path d="M5,70 Q40,55 75,70" fill="#A7F3D0" opacity="0.3" />
    <path d="M15,110 Q40,95 65,110" fill="#FCA5A5" opacity="0.35" />
    <!-- Round windows -->
    <circle cx="20" cy="30" r="4" fill="#475569" />
    <circle cx="40" cy="30" r="4" fill="#475569" />
    <circle cx="60" cy="30" r="4" fill="#475569" />
    <circle cx="20" cy="65" r="4" fill="#475569" />
    <circle cx="40" cy="65" r="4" fill="#475569" />
    <circle cx="60" cy="65" r="4" fill="#475569" />
    <circle cx="20" cy="100" r="4" fill="#475569" />
    <circle cx="40" cy="100" r="4" fill="#475569" />
    <circle cx="60" cy="100" r="4" fill="#475569" />
    <circle cx="20" cy="135" r="4" fill="#475569" />
    <circle cx="40" cy="135" r="4" fill="#475569" />
    <circle cx="60" cy="135" r="4" fill="#475569" />
  </g>

  <!-- Tower 3: Taller central tower (Pink clouds) -->
  <g transform="translate(390, 20)">
    <rect x="0" y="0" width="90" height="180" fill="url(#pabloPink)" stroke="#CBD5E1" stroke-width="1.5" rx="15" />
    <!-- Clouds -->
    <path d="M15,30 C30,10 60,10 75,30" fill="#C084FC" opacity="0.3" />
    <path d="M10,80 C35,60 65,60 80,80" fill="#93C5FD" opacity="0.4" />
    <path d="M20,130 C40,110 70,110 80,130" fill="#FDE047" opacity="0.3" />
    <!-- Round windows characteristic of Tours Aillaud -->
    <circle cx="25" cy="35" r="4.5" fill="#334155" />
    <circle cx="45" cy="35" r="4.5" fill="#334155" />
    <circle cx="65" cy="35" r="4.5" fill="#334155" />
    <circle cx="25" cy="75" r="4.5" fill="#334155" />
    <circle cx="45" cy="75" r="4.5" fill="#334155" />
    <circle cx="65" cy="75" r="4.5" fill="#334155" />
    <circle cx="25" cy="115" r="4.5" fill="#334155" />
    <circle cx="45" cy="115" r="4.5" fill="#334155" />
    <circle cx="65" cy="115" r="4.5" fill="#334155" />
    <circle cx="25" cy="155" r="4.5" fill="#334155" />
    <circle cx="45" cy="155" r="4.5" fill="#334155" />
    <circle cx="65" cy="155" r="4.5" fill="#334155" />
  </g>

  <!-- Tower 4: Taller Right (Green clouds) -->
  <g transform="translate(530, 30)">
    <rect x="0" y="0" width="80" height="170" fill="url(#pabloGreen)" stroke="#E2E8F0" stroke-width="1.2" rx="12" />
    <path d="M10,40 Q40,20 70,40" fill="#FCA5A5" opacity="0.3" />
    <path d="M5,95 Q40,75 75,95" fill="#93C5FD" opacity="0.4" />
    <!-- Round windows -->
    <circle cx="20" cy="35" r="4" fill="#475569" />
    <circle cx="40" cy="35" r="4" fill="#475569" />
    <circle cx="60" cy="35" r="4" fill="#475569" />
    <circle cx="20" cy="75" r="4" fill="#475569" />
    <circle cx="40" cy="75" r="4" fill="#475569" />
    <circle cx="60" cy="75" r="4" fill="#475569" />
    <circle cx="20" cy="115" r="4" fill="#475569" />
    <circle cx="40" cy="115" r="4" fill="#475569" />
    <circle cx="60" cy="115" r="4" fill="#475569" />
  </g>

  <!-- Tower 5: Right Medium (Purple clouds) -->
  <g transform="translate(660, 60)">
    <rect x="0" y="0" width="75" height="140" fill="url(#pabloPurple)" stroke="#E2E8F0" stroke-width="1.2" rx="10" />
    <path d="M10,30 Q35,15 60,30" fill="#A7F3D0" opacity="0.3" />
    <!-- Windows -->
    <circle cx="20" cy="30" r="3.5" fill="#475569" />
    <circle cx="38" cy="30" r="3.5" fill="#475569" />
    <circle cx="55" cy="30" r="3.5" fill="#475569" />
    <circle cx="20" cy="65" r="3.5" fill="#475569" />
    <circle cx="38" cy="65" r="3.5" fill="#475569" />
    <circle cx="55" cy="65" r="3.5" fill="#475569" />
    <circle cx="20" cy="100" r="3.5" fill="#475569" />
    <circle cx="38" cy="100" r="3.5" fill="#475569" />
    <circle cx="55" cy="100" r="3.5" fill="#475569" />
  </g>

  <!-- Tower 6: Far Right Small (Yellow clouds) -->
  <g transform="translate(780, 90)">
    <rect x="0" y="0" width="60" height="110" fill="url(#pabloYellow)" stroke="#E2E8F0" stroke-width="1" rx="8" />
    <!-- Windows -->
    <circle cx="15" cy="25" r="3" fill="#64748B" />
    <circle cx="30" cy="25" r="3" fill="#64748B" />
    <circle cx="45" cy="25" r="3" fill="#64748B" />
    <circle cx="15" cy="55" r="3" fill="#64748B" />
    <circle cx="30" cy="55" r="3" fill="#64748B" />
    <circle cx="45" cy="55" r="3" fill="#64748B" />
  </g>
</svg>
